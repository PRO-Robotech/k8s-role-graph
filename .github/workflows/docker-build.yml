name: docker-build-and-push
on:
  push:
    branches:
      - "*"
      - 'release/*'
      - 'feature/*'
      - 'hotfix/*'
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+rc[0-9]+"
  pull_request:
    branches: [main]

jobs:
  docker-build-amd64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: benjlevesque/short-sha@v3.0
        id: short-sha
        with:
          length: 8

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Configure Buildx cache
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.ref_name }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Create sanitized branch name
        id: sanitize
        run: echo "branch=$(echo ${GITHUB_REF_NAME} | sed 's/\//-/g')" >> $GITHUB_OUTPUT

      - name: Enable QEMU emulation
        run: docker run --rm --privileged tonistiigi/binfmt --install all

      - name: Build and push image server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.apiserver
          push: ${{ github.event_name == 'push' }}
          provenance: false
          platforms: linux/amd64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/k8s-role-graph.server:amd64-${{ steps.sanitize.outputs.branch }}-${{ steps.short-sha.outputs.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/k8s-role-graph.server:${{ steps.sanitize.outputs.branch }}-${{ steps.short-sha.outputs.sha }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Build and push image web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.web
          push: ${{ github.event_name == 'push' }}
          provenance: false
          platforms: linux/amd64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/k8s-role-graph.web:amd64-${{ steps.sanitize.outputs.branch }}-${{ steps.short-sha.outputs.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/k8s-role-graph.web:${{ steps.sanitize.outputs.branch }}-${{ steps.short-sha.outputs.sha }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move new cache
        if: always()
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
